<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Resume Screening</title>
  <style>
    body {
      font-family: Arial;
      max-width: 800px;
      margin: 40px auto;
    }

    textarea {
      width: 100%;
      height: 120px;
      margin-bottom: 10px;
    }

    .file-list {
      margin: 10px 0;
    }

    .file-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    button {
      padding: 8px 12px;
      margin-top: 10px;
      cursor: pointer;
    }

    .result {
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h2>🤖 AI Resume Screening</h2>

  <!-- JD输入 -->
  <textarea id="jd" placeholder="Paste Job Description here..."></textarea>

  <!-- 文件上传 -->
  <input type="file" id="fileInput" multiple accept=".pdf" />

  <!-- 文件列表 -->
  <div class="file-list" id="fileList"></div>

  <button onclick="submitData()">🚀 Analyze</button>

  <h3>Results:</h3>
  <div id="results"></div>

  <script>
    let files = [];

    const fileInput = document.getElementById("fileInput");
    const fileList = document.getElementById("fileList");

    // 🚀 自动切换环境（关键）
    const API_BASE =
      window.location.hostname === "localhost"
        ? "http://localhost:5000"
        : "http://independent-perception-production.up.railway.app";

    // 添加文件
    fileInput.addEventListener("change", (e) => {
      for (let f of e.target.files) {
        files.push(f);
      }
      renderFiles();
    });

    // 渲染文件列表
    function renderFiles() {
      fileList.innerHTML = "";

      files.forEach((file, index) => {
        const div = document.createElement("div");
        div.className = "file-item";

        div.innerHTML = `
          <span>${file.name}</span>
          <button onclick="removeFile(${index})">❌</button>
        `;

        fileList.appendChild(div);
      });
    }

    // 删除文件
    function removeFile(index) {
      files.splice(index, 1);
      renderFiles();
    }

    // 提交
    async function submitData() {
      const jd = document.getElementById("jd").value;

      if (!jd) {
        alert("Please enter JD");
        return;
      }

      if (files.length === 0) {
        alert("Please upload resumes");
        return;
      }

      const formData = new FormData();
      formData.append("jd", jd);

      files.forEach((file) => {
        formData.append("files", file); // ⚠️ 必须是 files
      });

      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = "⏳ Processing...";

      try {
        const res = await fetch(`${API_BASE}/rank`, {
          method: "POST",
          body: formData,
        });

        const data = await res.json();

        if (!Array.isArray(data)) {
          resultsDiv.innerHTML = "❌ Error: " + JSON.stringify(data);
          return;
        }

        renderResults(data);

      } catch (err) {
        console.error(err);
        resultsDiv.innerHTML = "❌ Error: " + err.message;
      }
    }

    // 渲染结果
    function renderResults(data) {
      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = "";

      data.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "result";

        div.innerHTML = `
          <strong>#${index + 1} ${item.name}</strong><br>
          Score: ${item.score}<br>
          Similarity: ${item.similarity}<br>
          Reason: ${item.reason}
        `;

        resultsDiv.appendChild(div);
      });
    }
  </script>

</body>
</html>
