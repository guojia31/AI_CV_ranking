<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Hiring Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

  <!-- LEFT: JD PANEL -->
  <div class="left-panel">

    <h1>🤖 AI Hiring Dashboard</h1>

    <div class="card">
      <h2>Job Description</h2>
      <textarea id="jd" placeholder="Paste JD here..."></textarea>
    </div>

    <div class="card">
      <h2>Upload Candidates</h2>
      <input type="file" id="fileInput" multiple accept=".pdf,.docx,.csv,.txt">
      <div id="fileList"></div>
    </div>

    <button class="btn" onclick="submitData()">Run Ranking</button>

    <div id="loading" class="loading hidden">Analyzing candidates...</div>

  </div>

  <!-- RIGHT: RESULTS -->
  <div class="right-panel">

    <h2>Ranking Results</h2>

    <div id="results"></div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
