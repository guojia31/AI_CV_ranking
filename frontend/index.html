<!DOCTYPE html>
<html>
<head>
  <title>AI Resume Screener</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🤖 AI Resume Screening</h1>

  <!-- JD -->
  <textarea id="jd" placeholder="Paste Job Description..."></textarea>

  <!-- 上传 -->
  <input type="file" id="fileInput" multiple accept=".pdf">

  <!-- 文件列表 -->
  <div id="fileList"></div>

  <button onclick="submitData()">🚀 Analyze</button>

  <div id="loading" class="hidden">Processing...</div>

  <div id="results"></div>
</div>

<script src="app.js"></script>
</body>
</html>
