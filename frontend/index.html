<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Resume Ranking System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🤖 AI Resume Screening System</h1>

  <!-- JD 输入 -->
  <div class="card">
    <h2>📄 Job Description</h2>
    <textarea id="jdInput" placeholder="Paste Job Description here..."></textarea>
  </div>

  <!-- 上传简历 -->
  <div class="card">
    <h2>📂 Upload Resumes (CSV)</h2>
    <input type="file" id="fileInput" accept=".csv">
  </div>

  <!-- 按钮 -->
  <button onclick="uploadAndRank()">🚀 Analyze & Rank</button>

  <!-- 加载 -->
  <div id="loading" class="hidden">Processing...</div>

  <!-- 结果 -->
  <div id="results"></div>
</div>

<script src="app.js"></script>
</body>
</html>
